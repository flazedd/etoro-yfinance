name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint + types + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (matches the version that wrote uv.lock)
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.2"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies (all extras — mypy checks the web/analysis code too)
        run: uv sync --frozen --all-extras

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy — strict via pyproject)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest -q
