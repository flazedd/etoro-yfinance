# docker-compose for ibkr-portfolio-connect on a Raspberry Pi (arm64) or
# any amd64 host. Two services:
#
#   rebalancer  — oneshot triggered by host cron (places trades).
#   dashboard   — long-lived read-only web UI on the LAN (NEVER trades; holds
#                 no OAuth creds; only reads the run records + logs).
#
# IBeam is no longer required: we authenticate with IBKR directly via
# OAuth 1.0a (signed by the private keys in ~/ibkr-oauth/), bypassing
# the Java-based local Gateway entirely.
#
# Run the rebalancer (cron does this monthly):
#     docker compose run --rm rebalancer
#
# Add a dry-run flag the first few times:
#     docker compose run --rm rebalancer --dry-run
#
# Start the dashboard (long-lived; view at http://<pi-host>:8080):
#     docker compose up -d dashboard

services:
  rebalancer:
    build:
      context: .
    image: ibkr-portfolio-connect:latest
    env_file: .env
    environment:
      # Override the key file paths to match the in-container mount below,
      # so the same .env (with host paths) works on Mac dev + Pi prod.
      IBIND_OAUTH1A_SIGNATURE_KEY_FP: /oauth/private_signature.pem
      IBIND_OAUTH1A_ENCRYPTION_KEY_FP: /oauth/private_encryption.pem
      # Audit trail + rotating log the dashboard reads (shared volume below).
      REPORT_DIR: /data/runs
      LOG_DIR: /data/logs
    volumes:
      # Read-only mount of the OAuth private keys. Host path adapts via
      # $HOME so the same compose works on Mac (/Users/<you>/ibkr-oauth)
      # and Pi (/home/pi/ibkr-oauth).
      - ${HOME}/ibkr-oauth:/oauth:ro
      # Run records + logs, written here and read by the dashboard.
      - ./data/runs:/data/runs
      - ./data/logs:/data/logs
    # Do NOT start automatically; cron triggers via `docker compose run`.
    profiles: ["manual"]
    restart: "no"

  dashboard:
    build:
      context: .
      args:
        # Pull in fastapi + uvicorn for this image only.
        EXTRAS: "--extra dashboard"
    image: ibkr-portfolio-connect-dashboard:latest
    # Read-only web server. No env_file: it needs NO OAuth creds, just paths.
    environment:
      REPORT_DIR: /data/runs
      LOG_DIR: /data/logs
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8080"
    entrypoint: ["ibkr-dashboard"]
    volumes:
      # Read-only: the dashboard can never modify the audit trail.
      - ./data/runs:/data/runs:ro
      - ./data/logs:/data/logs:ro
    ports:
      # Publish on the host. On a home LAN behind a router this is LAN-only;
      # for a stricter bind, prefix the Pi's LAN IP, e.g.
      #   - "192.168.1.50:8080:8080"
      # NEVER port-forward this on your router.
      - "8080:8080"
    restart: unless-stopped
