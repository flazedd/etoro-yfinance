{# A faceted <select>. Same markup inline (in the form) and as an HTMX
   out-of-band swap (oob=true) so counts refresh when other filters change.
   `badge`/`badge_class` render a small pill above the select naming the table
   column it filters (skipped on the oob swap, which only replaces the <select>
   by id — the badge is static). All selects share one width for uniformity. #}
{% macro sel(name, label, options, selected, prefix='', extra=' w-40', oob=false, badge='', badge_class='src-derived') %}
{%- if not oob %}<label class="flex flex-col gap-1">
  <span class="badge {{ badge_class }}"{{ ' style=visibility:hidden'|safe if not badge }}>{{ badge or '—' }}</span>{% endif %}
<select id="f-{{ name }}" name="{{ name }}"{% if oob %} hx-swap-oob="true"{% endif %}
        class="border border-slate-300 rounded-md px-2 py-1.5 text-sm{{ extra }}">
  <option value="" {{ 'selected' if not selected }}>{{ label }}</option>
  {% for val, n in options %}
  <option value="{{ val }}" {{ 'selected' if selected==val }}>{{ prefix }}{{ val }} ({{ '{:,}'.format(n) }})</option>
  {% endfor %}
</select>
{%- if not oob %}</label>{% endif %}
{% endmacro %}
