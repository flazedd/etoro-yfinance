{# Filter toggle (old 200-SMA ⇄ new Vol-target) + money-market yield / cost
   assumptions + Run update. Re-rendered out-of-band with the rows so the active
   state and inputs stay in sync. Every control carries mm+cost via hx-include. #}
<div class="flex items-center gap-2 flex-wrap justify-end">
  <div class="inline-flex rounded-md border border-slate-300 overflow-hidden text-xs"
       data-tip="Filter used for the Label, Since and f/a columns and the charts.&#10;&#10;200-SMA: fully in above the 200-day average, cash below.&#10;Vol-target: same trend gate, but sizes the position inversely to recent volatility.">
    {% for f in filters %}
    <button hx-get="/monitor/rows?variant={{ f }}" hx-include="#mm-input,#cost-input"
            hx-target="#monitor-rows" hx-swap="innerHTML"
            class="px-3 py-1.5 font-medium {{ 'bg-slate-800 text-white' if variant == f else 'bg-white text-slate-600 hover:bg-slate-50' }}">
      {{ filter_labels[f] }} <span class="{{ 'text-slate-300' if variant == f else 'text-slate-400' }}">{{ 'old' if f == 'sma' else 'new' }}</span>
    </button>
    {% endfor %}
  </div>
  <label class="flex items-center gap-1 text-xs text-slate-500"
         data-tip="Annual yield credited to the idle cash (money-market) leg while the filter is out of the market.">MM %/yr
    <input id="mm-input" name="mm" type="number" step="0.5" min="0" value="{{ mm }}"
           hx-get="/monitor/rows?variant={{ variant }}" hx-include="#mm-input,#cost-input"
           hx-trigger="change" hx-target="#monitor-rows" hx-swap="innerHTML"
           class="border border-slate-300 rounded px-1.5 py-0.5 tabular" style="width:52px"></label>
  <label class="flex items-center gap-1 text-xs text-slate-500"
         data-tip="Transaction cost in basis points charged on every dollar that moves in or out — i.e. per unit of turnover |Δposition|. A binary switch costs the full bps; the vol variant pays a little each day it resizes.">cost bps
    <input id="cost-input" name="cost" type="number" step="1" min="0" value="{{ cost }}"
           hx-get="/monitor/rows?variant={{ variant }}" hx-include="#mm-input,#cost-input"
           hx-trigger="change" hx-target="#monitor-rows" hx-swap="innerHTML"
           class="border border-slate-300 rounded px-1.5 py-0.5 tabular" style="width:48px"></label>
  <button class="rules-btn" hx-post="/monitor/run?variant={{ variant }}" hx-include="#mm-input,#cost-input"
          hx-target="#monitor-rows" hx-swap="innerHTML"
          data-tip="Recompute all sector indices from the price store (background; rows refresh as it goes).">Run update</button>
</div>
