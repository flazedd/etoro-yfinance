<div hx-get="/alphalab/progress?job={{ job_id }}" hx-trigger="load delay:600ms" hx-swap="outerHTML">
  <div class="text-xs text-slate-500 mb-1">{{ label }} · {{ (pct * 100)|round|int }}%</div>
  <div class="bt-track"><div class="bt-fill" style="width:{{ (pct * 100)|round|int }}%"></div></div>
</div>
