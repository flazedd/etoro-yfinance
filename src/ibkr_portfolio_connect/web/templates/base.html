<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Momentum{% endblock %} · momentum-stack</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body class="h-full bg-slate-50 text-slate-800">
  <div class="min-h-full">
    <header class="bg-slate-900 text-slate-100">
      <div class="mx-auto max-w-7xl px-4 flex items-center gap-6 h-14">
        <span class="font-semibold tracking-tight">momentum<span class="text-emerald-400">·</span>stack</span>
        <nav class="flex gap-1 text-sm">
          {% set tabs = [('universe','Universe → IBKR'),('portfolio','Portfolio'),('execution','Execution'),('performance','Performance'),('diagnostics','Diagnostics')] %}
          {% for key,label in tabs %}
          <a href="/{{ key }}" class="px-3 py-1.5 rounded-md {{ 'bg-slate-700 text-white' if active==key else 'text-slate-300 hover:bg-slate-800' }}">{{ label }}</a>
          {% endfor %}
        </nav>
        <span class="ml-auto text-xs text-slate-400">RPi4 · read-only UI</span>
      </div>
    </header>
    <main class="mx-auto max-w-7xl px-4 py-6">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
